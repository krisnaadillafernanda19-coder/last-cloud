name: Deploy Dynamic Web

on:
  push:
    branches:
      - main
    paths:
      - "dynamic-app/**"
      - "database/**"
      - "nginx/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy-dynamic.yml"

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push dynamic image
        uses: docker/build-push-action@v6
        with:
          context: ./dynamic-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-dynamic-uas:latest

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          source: "docker-compose.yml,nginx/,database/"
          target: "~/uas-krisnaadilla"

      - name: Pull and restart containers on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            cd ~/uas-krisnaadilla
            cat > .env << 'ENVEOF'
            STATIC_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/web-statis-uas:latest
            DYNAMIC_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/web-dynamic-uas:latest
            DB_USER=uas_user
            DB_PASSWORD=uas_password
            DB_NAME=uas_db
            MARIADB_ROOT_PASSWORD=uas_root_password
            ENVEOF
            docker compose pull dynamic-app
            docker compose up -d --no-deps dynamic-app
            docker image prune -f

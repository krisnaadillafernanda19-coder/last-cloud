version: '3.8'

services:
  # Service Web Statis (CV) - deploy dari Docker Hub
  static-web:
    image: ${STATIC_IMAGE:-krsnaadlaaa/web-statis-uas:latest}
    container_name: uas-static-web
    restart: always

  # Service Aplikasi PHP Dynamic
  dynamic-app:
    image: ${DYNAMIC_IMAGE:-krsnaadlaaa/web-dynamic-uas:latest}
    container_name: uas-dynamic-app
    restart: always
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=${DB_USER:-uas_user}
      - DB_PASSWORD=${DB_PASSWORD:-uas_password}
      - DB_NAME=${DB_NAME:-uas_db}
    depends_on:
      - mariadb

  # Service Web Server (Nginx) - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: uas-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - static-web
      - dynamic-app

  # Service Database (MariaDB)
  mariadb:
    image: mariadb:10.11
    container_name: uas-mariadb
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-uas_root_password}
      - MARIADB_USER=${DB_USER:-uas_user}
      - MARIADB_PASSWORD=${DB_PASSWORD:-uas_password}
      - MARIADB_DATABASE=${DB_NAME:-uas_db}
    volumes:
      - ./database/krisna_topup.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:

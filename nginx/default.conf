upstream dynamic_app {
    server dynamic-app:80;
}

upstream static_web {
    server static-web:80;
}

server {
    listen 80;
    server_name _;

    # Static CV Web - akses via /cv/
    location /cv/ {
        proxy_pass http://static_web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dynamic PHP App - root path
    location / {
        proxy_pass http://dynamic_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
